[build]
  builder = "nixpacks"
  buildCommand = "python scripts/graphify.py && python scripts/jdocmunch.py && python scripts/jcodemunch.py && python scripts/graph.py && cd site && npm ci && npm run build"

[deploy]
  startCommand = "cd site && npm start"
  healthcheckPath = "/"
  restartPolicyType = "on_failure"
